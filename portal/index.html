<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Azzas 2154 — Biblioteca de Análises</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Red+Hat+Display:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="/public/assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/public/assets/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/public/assets/apple-touch-icon-180x180.png">
  <link rel="mask-icon" href="/public/assets/maskable-icon.png" color="#274566">
  <script type="importmap">
{
  "imports": {
    "@azure/msal-browser": "https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/+esm"
  }
}
</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Neutros */
      --ink:            #000000;
      --ink-soft:       #595959;
      --ink-faint:      #999999;
      --surface:        #FFFFFF;
      --surface-warm:   #E8E8E4;
      --surface-cream:  #F9F6EA;

      /* Azuis */
      --navy:           #274566;
      --steel:          #3D5A73;
      --blue-soft:      #A1C6ED;
      --blue-light:     #C5D9ED;

      /* Funcionais */
      --status-pending: #B5AFA8;

      /* Tipografia */
      --font-primary:   'Red Hat Display', Arial, sans-serif;
      --font-editorial: 'Playfair Display', Georgia, serif;
    }

    body {
      background: var(--surface-cream);
      color: var(--ink);
      font-family: var(--font-primary);
      min-height: 100vh;
    }

    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      gap: 16px;
      color: var(--ink-soft);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--surface-warm);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Library view ── */
    #library-view { display: none; }

    header {
      background: var(--ink);
      color: var(--surface);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 {
      font-family: var(--font-primary);
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--surface);
      flex: 1;
    }
    #user-email {
      font-size: 0.75rem;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.5);
    }

    .hero {
      background: var(--navy);
      color: var(--surface);
      padding: 3rem 2rem;
      text-align: center;
    }
    .hero-eyebrow {
      font-family: var(--font-primary);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--blue-soft);
      margin-bottom: 0.85rem;
    }
    .hero-title {
      font-family: var(--font-primary);
      font-weight: 400;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: 0.03em;
      line-height: 1.1;
    }

    .filters {
      padding: 0.85rem 1.5rem;
      background: var(--surface-warm);
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }
    .chip {
      font-family: var(--font-primary);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.3rem 0.8rem;
      border-radius: 4px;
      background: transparent;
      border: 1px solid rgba(39, 69, 102, 0.25);
      color: var(--ink-soft);
      cursor: pointer;
      transition: all 0.15s;
    }
    .chip:hover {
      border-color: var(--navy);
      color: var(--navy);
    }
    .chip.active {
      background: var(--navy);
      color: var(--surface);
      border-color: var(--navy);
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--surface-warm);
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }
    .card:hover {
      border-color: var(--navy);
      transform: translateY(-2px);
    }
    .card-brand {
      font-family: var(--font-primary);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--navy);
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .card-title {
      font-family: var(--font-primary);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 0.25rem;
      line-height: 1.3;
    }
    .card-period {
      font-family: var(--font-primary);
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--ink-faint);
      margin-bottom: 0.5rem;
    }
    .card-desc {
      font-family: var(--font-primary);
      font-size: 0.8rem;
      font-weight: 300;
      color: var(--ink-soft);
      line-height: 1.5;
      margin-bottom: 0.75rem;
    }
    .card-footer {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .tag {
      background: rgba(39, 69, 102, 0.07);
      color: var(--navy);
      font-family: var(--font-primary);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
    }
    .badge-public {
      margin-left: auto;
      font-family: var(--font-primary);
      font-size: 0.6rem;
      font-weight: 600;
      color: var(--steel);
      border: 1px solid var(--blue-soft);
      border-radius: 4px;
      padding: 0.1rem 0.4rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .btn-share {
      margin-left: auto;
      font-family: var(--font-primary);
      font-size: 0.6rem;
      font-weight: 600;
      color: var(--ink-faint);
      background: none;
      border: 1px solid var(--surface-warm);
      border-radius: 4px;
      padding: 0.1rem 0.4rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-share:hover { color: var(--steel); border-color: var(--blue-soft); }
    .btn-share:disabled { opacity: 0.4; cursor: default; }

    #empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 0;
      color: var(--ink-faint);
      font-family: var(--font-editorial);
      font-style: italic;
    }

    /* ── Analysis view ── */
    #analysis-view {
      display: none;
      flex-direction: column;
      height: 100vh;
    }
    .analysis-bar {
      background: var(--ink);
      color: var(--surface);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    #back-btn {
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: var(--surface);
      font-family: var(--font-primary);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    #back-btn:hover {
      border-color: var(--blue-soft);
      color: var(--blue-soft);
    }
    #analysis-crumb {
      font-family: var(--font-editorial);
      font-style: italic;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.7);
    }
    #analysis-iframe {
      flex: 1;
      border: none;
      background: var(--surface);
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <span>Autenticando…</span>
</div>

<div id="library-view">
  <header>
    <h1>Azzas 2154</h1>
    <span id="user-email"></span>
  </header>
  <section class="hero">
    <div class="hero-eyebrow">Biblioteca de Análises</div>
    <h2 class="hero-title">Inteligência de Negócio</h2>
  </section>
  <div class="filters" id="filters">
    <button class="chip active" data-filter="all">Todas</button>
  </div>
  <div id="grid"></div>
</div>

<div id="analysis-view">
  <div class="analysis-bar">
    <button id="back-btn">← Biblioteca</button>
    <span id="analysis-crumb"></span>
  </div>
  <iframe id="analysis-iframe" src="" allow="same-origin"></iframe>
</div>

<script type="module">
import { initMsal, InteractionRequiredAuthError } from './msal-init.js'

// ────────────────────────────────────────────────────────────────────────────

let userIdentity = null
let currentDomain = null
let allAnalyses = []
let activeFilter = 'all'

async function init() {
  try {
    const msalInstance = await initMsal()
    await msalInstance.initialize()
    const redirectResult = await msalInstance.handleRedirectPromise()

    let idToken = null
    if (redirectResult) {
      idToken = redirectResult.idToken
    } else {
      const accounts = msalInstance.getAllAccounts()
      if (accounts.length === 0) {
        await msalInstance.loginRedirect({ scopes: ['openid', 'profile'] })
        return
      }
      try {
        const silent = await msalInstance.acquireTokenSilent({
          account: accounts[0],
          scopes: ['openid', 'profile']
        })
        idToken = silent.idToken
      } catch (e) {
        if (e instanceof InteractionRequiredAuthError) {
          await msalInstance.loginRedirect({ scopes: ['openid', 'profile'] })
          return
        }
        throw e
      }
    }

    const authResult = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ idToken }),
      credentials: 'include'
    })
    if (!authResult.ok) throw new Error('Falha na autenticação com o servidor')
    const { identity } = await authResult.json()
    userIdentity = identity

    const accounts = msalInstance.getAllAccounts()
    if (accounts[0]?.username) {
      document.getElementById('user-email').textContent = accounts[0].username
    }

    const configRes = await fetch('/api/config')
    const { domain } = await configRes.json()
    currentDomain = domain
    await loadLibrary(domain)
  } catch (err) {
    document.getElementById('loading').innerHTML =
      `<p style="color:var(--ink); font-family:var(--font-editorial); font-style:italic;">Erro: ${err.message}</p>`
  }
}

async function loadLibrary(domain) {
  const [publicRes, privateRes] = await Promise.allSettled([
    fetch(`library/${domain}/public.json`).then(r => r.json()),
    fetch(`library/${domain}/${encodeURIComponent(userIdentity)}.json`).then(r => r.json())
  ])

  const publicList = publicRes.status === 'fulfilled' ? publicRes.value : []
  const privateList = privateRes.status === 'fulfilled' ? privateRes.value : []

  // Merge: private has priority (owns the entry); deduplicate by id
  const byId = new Map()
  publicList.forEach(a => byId.set(a.id, a))
  privateList.forEach(a => byId.set(a.id, a))
  allAnalyses = [...byId.values()].sort((a, b) => b.date.localeCompare(a.date))

  buildFilters()
  renderGrid()

  document.getElementById('loading').style.display = 'none'
  document.getElementById('library-view').style.display = 'block'
}

function buildFilters() {
  const brands = [...new Set(allAnalyses.map(a => a.brand).filter(Boolean))]
  const tags = [...new Set(allAnalyses.flatMap(a => a.tags ?? []))]
  const filtersEl = document.getElementById('filters')
  filtersEl.innerHTML = '<button class="chip active" data-filter="all">Todas</button>'

  brands.forEach(b => {
    const btn = document.createElement('button')
    btn.className = 'chip'
    btn.dataset.filter = `brand:${b}`
    btn.textContent = b
    filtersEl.appendChild(btn)
  })

  tags.slice(0, 8).forEach(t => {
    const btn = document.createElement('button')
    btn.className = 'chip'
    btn.dataset.filter = `tag:${t}`
    btn.textContent = t
    filtersEl.appendChild(btn)
  })

  filtersEl.addEventListener('click', e => {
    const chip = e.target.closest('.chip')
    if (!chip) return
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'))
    chip.classList.add('active')
    activeFilter = chip.dataset.filter
    renderGrid()
  })
}

function getFiltered() {
  if (activeFilter === 'all') return allAnalyses
  const [type, value] = activeFilter.split(':')
  if (type === 'brand') return allAnalyses.filter(a => a.brand === value)
  if (type === 'tag') return allAnalyses.filter(a => a.tags?.includes(value))
  return allAnalyses
}

function renderGrid() {
  const grid = document.getElementById('grid')
  const filtered = getFiltered()
  if (filtered.length === 0) {
    grid.innerHTML = '<div id="empty">Nenhuma análise encontrada.</div>'
    return
  }

  grid.innerHTML = ''
  filtered.forEach(a => {
    const card = document.createElement('div')
    card.className = 'card'
    card.innerHTML = `
      <div class="card-brand">${a.brand ?? ''}</div>
      <div class="card-title">${a.title}</div>
      <div class="card-period">${a.period ?? a.date}</div>
      <div class="card-desc">${a.description ?? ''}</div>
      <div class="card-footer">
        ${(a.tags ?? []).map(t => `<span class="tag">${t}</span>`).join('')}
        ${a.public
          ? '<span class="badge-public">público</span>'
          : (a.file?.startsWith(`analyses/${currentDomain}/${userIdentity}/`)
              ? `<button class="btn-share" data-id="${a.id}">tornar público</button>`
              : '')}
      </div>
    `
    card.querySelector('.btn-share')?.addEventListener('click', e => {
      e.stopPropagation()
      shareAnalysis(a, e.currentTarget)
    })
    card.addEventListener('click', () => openAnalysis(a))
    grid.appendChild(card)
  })
}

function openAnalysis(analysis) {
  document.getElementById('library-view').style.display = 'none'
  const view = document.getElementById('analysis-view')
  view.style.display = 'flex'
  document.getElementById('analysis-crumb').textContent =
    `${analysis.brand ?? ''} · ${analysis.title}`
  document.getElementById('analysis-iframe').src = analysis.file
}

document.getElementById('back-btn').addEventListener('click', () => {
  document.getElementById('analysis-view').style.display = 'none'
  document.getElementById('analysis-iframe').src = ''
  document.getElementById('library-view').style.display = 'block'
})

async function shareAnalysis(analysis, btn) {
  btn.disabled = true
  btn.textContent = 'publicando…'
  try {
    const res = await fetch('/api/share', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ analysisId: analysis.id }),
    })
    const data = await res.json()
    if (!res.ok) throw new Error(data.error ?? 'Erro desconhecido')
    // Update in-memory entry so iframe opens the public URL going forward
    analysis.public = true
    analysis.file = data.publicUrl.replace(/^\//, '')
    renderGrid()
  } catch (err) {
    alert(`Erro ao tornar público: ${err.message}`)
    btn.disabled = false
    btn.textContent = 'tornar público'
  }
}

init()
</script>
</body>
</html>
